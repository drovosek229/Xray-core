name: Build Linux and Darwin Distros

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  prepare-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download geo assets
        run: |
          mkdir -p resources
          curl -fsSL https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat -o resources/geoip.dat
          curl -fsSL https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat -o resources/geosite.dat
          test -s resources/geoip.dat
          test -s resources/geosite.dat

      - name: Upload geo assets
        uses: actions/upload-artifact@v7
        with:
          name: geo-assets
          path: |
            resources/geoip.dat
            resources/geosite.dat
          if-no-files-found: error

  build:
    needs: prepare-assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_name: linux-amd64
            goos: linux
            goarch: amd64
          - asset_name: linux-arm64
            goos: linux
            goarch: arm64
          - asset_name: darwin-amd64
            goos: darwin
            goarch: amd64
          - asset_name: darwin-arm64
            goos: darwin
            goarch: arm64
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Validate release source
        if: github.event_name == 'release'
        run: |
          set -euo pipefail

          release_tag='${{ github.event.release.tag_name }}'
          target_commitish='${{ github.event.release.target_commitish }}'
          event_commit='${{ github.sha }}'

          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'

          head_commit="$(git rev-parse HEAD)"
          if [[ "${head_commit}" != "${event_commit}" ]]; then
            echo "::error::Checked out ${head_commit}, expected release event commit ${event_commit}."
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "refs/tags/${release_tag}^{commit}")"
          if [[ "${tag_commit}" != "${event_commit}" ]]; then
            echo "::error::Release tag ${release_tag} resolves to ${tag_commit}, expected ${event_commit}."
            exit 1
          fi

          if git rev-parse -q --verify "origin/${target_commitish}^{commit}" >/dev/null; then
            target_commit="$(git rev-parse "origin/${target_commitish}^{commit}")"
          elif git rev-parse -q --verify "${target_commitish}^{commit}" >/dev/null; then
            target_commit="$(git rev-parse "${target_commitish}^{commit}")"
          else
            echo "::error::Unable to resolve release target_commitish ${target_commitish}."
            exit 1
          fi

          if [[ "${target_commit}" != "${event_commit}" ]]; then
            echo "::error::Release target ${target_commitish} resolves to ${target_commit}, expected ${event_commit}."
            exit 1
          fi

      - name: Resolve build metadata
        run: |
          set -euo pipefail

          build_commit="$(git rev-parse --short=7 HEAD)"
          release_tag=""

          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            release_tag='${{ github.event.release.tag_name }}'
          elif git describe --tags --exact-match >/dev/null 2>&1; then
            release_tag="$(git describe --tags --exact-match)"
          fi

          echo "BUILD_COMMIT=${build_commit}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Download Go modules
        run: go mod download

      - name: Download geo assets
        uses: actions/download-artifact@v6
        with:
          name: geo-assets
          path: resources

      - name: Build binary
        run: |
          mkdir -p build_assets
          go build \
            -o build_assets/xray \
            -trimpath \
            -buildvcs=false \
            -gcflags="all=-l=4" \
            -ldflags="-X github.com/xtls/xray-core/core.build=${BUILD_COMMIT} -X github.com/xtls/xray-core/core.releaseTag=${RELEASE_TAG} -s -w -buildid=" \
            -v ./main

      - name: Assemble package
        run: |
          cp resources/geoip.dat build_assets/
          cp resources/geosite.dat build_assets/
          cp README.md build_assets/
          cp LICENSE build_assets/
          printf 'target=%s\nrelease=%s\ncommit=%s\n' \
            "${{ matrix.asset_name }}" \
            "${RELEASE_TAG}" \
            "$(git rev-parse HEAD)" > build_assets/BUILD_INFO.txt

      - name: Create archive
        run: |
          archive="Xray-${{ matrix.asset_name }}.tar.gz"
          tar -C build_assets -czf "${archive}" .
          sha256sum "${archive}" > "${archive}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset_name }}
          path: |
            Xray-${{ matrix.asset_name }}.tar.gz
            Xray-${{ matrix.asset_name }}.tar.gz.sha256
          if-no-files-found: error

  publish-release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v6
        with:
          path: release_assets
          pattern: release-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd release_assets
          sha256sum Xray-*.tar.gz > SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/Xray-*.tar.gz
            release_assets/Xray-*.tar.gz.sha256
            release_assets/SHA256SUMS
          generate_release_notes: true
